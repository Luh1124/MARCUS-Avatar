[project]
name = "MARCUS-Avatar"
version = "0.1.0"
description = "Monocular Avatar Reconstruction via Cascaded Diffusion Priors and UV-Space Differentiable Shading"
authors = ["Hong Li <lihong@buaa.edu.cn>"]
channels = ["conda-forge"]
platforms = ["osx-arm64", "linux-64", "win-64"]

[dependencies]
python = ">=3.10"
pytorch = ">=2.0.0"
torchvision = ">=0.15.0"
numpy = ">=1.24.0"
scipy = ">=1.10.0"
scikit-image = ">=0.20.0"
opencv = ">=4.8.0"
pillow = ">=9.0.0"
imageio = ">=2.31.0"
mediapipe = ">=0.10.0"
tqdm = ">=4.65.0"
huggingface_hub = ">=0.20.0"

[pypi-dependencies]
diffusers = ">=0.27.0"
transformers = ">=4.36.0"
accelerate = ">=0.25.0"
peft = ">=0.8.0"
safetensors = ">=0.4.0"
einops = ">=0.8.0"
sentencepiece = ">=0.2.0"
gradio = ">=4.0.0"
tensorflow = ">=2.15.0"
mtcnn = ">=1.0.0"
albumentations = ">=2.0.0"
kornia = ">=0.8.0"
timm = ">=1.0.0"
pygltflib = ">=1.16.0"
trimesh = ">=4.0.0"
easydict = ">=1.10"
torchsummary = ">=1.5.1"

[tasks]
download-weights = "python download_weights.py"
app = "python app.py"
batch-infer = "python batch_infer.py"

[system-requirements]
cuda = "12.1"
